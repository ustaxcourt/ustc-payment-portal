config:
  target: "http://localhost:8080"
  # target: "https://dev-payments.ustaxcourt.gov"

  http:
    timeout: 30

  ensure:
    maxErrorRate: 100

  phases:
    - duration: 60
      arrivalRate: 167
      name: stress-10000-rpm

  defaults:
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
      Authorization: "${PAY_GOV_DEV_SERVER_ACCESS_TOKEN}"

  processor: "../processor.js"
