scenarios:
  - name: full-flow
    weight: 30
    flow:
      # - log: "== STARTING FULL FLOW SCENARIO =="

      - function: "setTransactionReferenceId"

      # STEP 1
      - post:
          url: "/init"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          json:
            transactionReferenceId: "{{ transactionReferenceId }}"
            fee: "PETITION_FILING_FEE"
            urlSuccess: "https://client.app/success"
            urlCancel: "https://client.app/cancel"
            metadata:
              docketNumber: "{{ $randomString() }}"
          capture:
            - json: $.token
              as: "paymentToken"
      # - log: "INIT COMPLETED"

      - think: 1

      # STEP 2
      - function: "choosePaymentOutcome"
      # - log: "PAYMENT OUTCOME CHOSEN"

      - think: 1

      # STEP 3
      - post:
          url: "/process"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          json:
            token: "{{ paymentToken }}"
          expect:
            - statusCode: 200
      # - log: "PROCESS COMPLETED"

      - think: 1
      # - log: "Transaction Reference ID: {{ transactionReferenceId }}"

      # STEP 4
      - get:
          url: "/details/{{ transactionReferenceId }}"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          capture:
            - json: $.paymentStatus
              as: "paymentStatus"
              default: "NOT_READY"
          expect:
            - statusCode: 200
          retry:
            count: 5
            delay: 1
      # - log: "DETAILS COMPLETED - status={{ paymentStatus }}"
