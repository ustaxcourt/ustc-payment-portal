scenarios:
  - name: full-flow
    weight: 30
    flow:
      - function: "setTransactionReferenceId"

      # STEP 1
      - post:
          url: "/init"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          json:
            transactionReferenceId: "{{ transactionReferenceId }}"
            fee: "PETITION_FILING_FEE"
            urlSuccess: "https://client.app/success"
            urlCancel: "https://client.app/cancel"
            metadata:
              docketNumber: '{{ $loremWord() }}'
          expect:
            - statusCode: 200
          capture:
            - json: $.token
              as: "paymentToken"

      - think: 1

      # STEP 2
      - function: "choosePaymentOutcome"

      - think: 1

      # STEP 3
      - post:
          url: "/process"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          json:
            token: "{{ paymentToken }}"
          expect:
            - statusCode: 200

      - think: 1

      # STEP 4
      - get:
          url: "/details/{{ transactionReferenceId }}"
          beforeRequest: "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          capture:
            - json: $.paymentStatus
              as: "paymentStatus"
              default: "NOT_READY"
          expect:
            - statusCode: 200
            - function: "validatePaymentComplete"
          retry:
            count: 5
            delay: 1
