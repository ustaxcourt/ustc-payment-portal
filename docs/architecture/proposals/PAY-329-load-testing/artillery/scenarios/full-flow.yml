scenarios:
  - name: full-flow
    weight: 30
    flow:
      - log: "== STARTING FULL FLOW SCENARIO =="

      # STEP 1
      - post:
          url: "/init"
          json:
            transactionReferenceId: "{{ $uuid }}"
            fee: "PETITION_FILING_FEE"
            urlSuccess: "https://client.app/success"
            urlCancel: "https://client.app/cancel"
            metadata:
              docketNumber: "{{ $randomString() }}"
          capture:
            - json: $.token
              as: "paymentToken"
      - log: "INIT COMPLETED"

      - think: 1

      # STEP 2
      - function: "choosePaymentOutcome"
      - log: "PAYMENT OUTCOME CHOSEN"

      - think: 1

      # STEP 3
      - post:
          url: "/process"
          json:
            token: "{{ paymentToken }}"
          expect:
            - statusCode: 200
      - log: "PROCESS COMPLETED"

      # STEP 4
      - get:
          url: "/details/{{ transactionReferenceId }}"
          expect:
            - statusCode: 200
      - log: "DETAILS COMPLETED"
