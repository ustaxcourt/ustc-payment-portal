scenarios:
  - name: full-flow
    weight: 30
    flow:
      - function: "setTransactionReferenceId"

      # STEP 1
      - post:
          url: "/init"
          beforeRequest:
            - "setSignedBody"
            - "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          body: "{{ requestBody }}"
          # json:
          #   transactionReferenceId: "{{ transactionReferenceId }}"
          #   fee: "PETITION_FILING_FEE"
          #   urlSuccess: "https://client.app/success"
          #   urlCancel: "https://client.app/cancel"
          #   metadata:
          #     docketNumber: '{{ $loremWord() }}'
          expect:
            - statusCode: 200
          capture:
            - json: $.token
              as: "paymentToken"

      - think: 1

      - function: "setPaymentOutcome"

      # STEP 2
      - post:
          url: "/pay/{{ choice.method }}/{{ choice.status }}?token={{ paymentToken }}"
          headers:
            Authorization: "{{ PAY_GOV_DEV_SERVER_ACCESS_TOKEN }}"
          expect:
            - statusCode: 200

      - think: 1

      - log: "Payment outcome chosen: {{ paymentOutcome }}"

      # STEP 3
      - post:
          url: "/process"
          beforeRequest:
            - "setSignedBody"
            - "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          json:
            token: "{{ paymentToken }}"
          expect:
            - statusCode: 200

      - think: 1

      # STEP 4
      - get:
          url: "/details/{{ transactionReferenceId }}"
          beforeRequest:
            - "setSignedBody"
            - "signWithSigV4IfNeeded"
          afterResponse: "logResponse"
          capture:
            - json: $.paymentStatus
              as: "paymentStatus"
              default: "NOT_READY"
          expect:
            - statusCode: 200
            - function: "validatePaymentComplete"
          retry:
            count: 5
            delay: 1
