name: Production Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to deploy (e.g., v1.2.3)"
        required: true
        type: string
      plan_only:
        description: "Run up to terraform plan (no apply)"
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  DEV_ARTIFACT_BUCKET: ${{ vars.DEV_ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Determine tag and reject RC tags
        id: check
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$GH_EVENT_NAME" = "release" ]; then
            TAG="$GH_RELEASE_TAG"
          else
            TAG="$GH_INPUT_TAG"
          fi
          [ -n "${TAG:-}" ] || { echo "Empty tag" >&2; exit 1; }
          case "$TAG" in
            *-rc.*)
              echo "::error::Refusing to deploy '$TAG' to production: RC tags are release candidates, not releases. Cut a proper release tag from the same commit and deploy that instead." >&2
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  promote:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    outputs:
      sha: ${{ steps.select.outputs.sha }}
      tag: ${{ steps.select.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (read dev artifacts)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Select tag and SHA
        id: select
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ needs.guard.outputs.tag }}'
          SHA=$(git rev-list -n 1 "$TAG")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Validate artifacts exist for SHA
        shell: bash
        run: |
          set -euo pipefail
          SHA='${{ steps.select.outputs.sha}}'
          echo "Validating artifacts for $SHA in s3://${DEV_ARTIFACT_BUCKET}/artifacts/dev/$SHA/"
          for f in initPayment processPayment getDetails testCert migrationRunner; do
            KEY="artifacts/dev/${SHA}/${f}.zip"
            aws s3api head-object --bucket "${DEV_ARTIFACT_BUCKET}" --key "$KEY" >/dev/null 2>&1 || {
              echo "Missing $KEY" >&2; exit 1; }
          done
          echo "All artifacts present"

  deploy:
    runs-on: ubuntu-latest
    needs: [promote]
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.promote.outputs.tag }}
          fetch-depth: 0

      - name: Echo RC tag and SHA
        run: |
          echo "RC tag: ${{ needs.promote.outputs.tag}}"
          echo "SHA:    ${{ needs.promote.outputs.sha }}"

      - name: Export artifact bucket (env)
        run: |
          echo "Dev bucket: $DEV_ARTIFACT_BUCKET"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

      - name: Configure AWS Credentials (OIDC - Prd)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.PROD_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build artifact key map (dev bucket)
        id: artifacts
        run: |
          set -euo pipefail
          SHA='${{ needs.promote.outputs.sha }}'
          PREFIX="artifacts/dev/${SHA}"
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "initPayment=${PREFIX}/initPayment.zip" >> $GITHUB_OUTPUT
          echo "processPayment=${PREFIX}/processPayment.zip" >> $GITHUB_OUTPUT
          echo "getDetails=${PREFIX}/getDetails.zip" >> $GITHUB_OUTPUT
          echo "testCert=${PREFIX}/testCert.zip" >> $GITHUB_OUTPUT
          echo "migrationRunner=${PREFIX}/migrationRunner.zip" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/environments/prod
        run: terraform init -input=false -backend-config=backend.hcl -reconfigure

      - name: Terraform plan
        id: tf_plan
        working-directory: terraform/environments/prod
        env:
          TF_VAR_artifact_bucket: ${{ env.DEV_ARTIFACT_BUCKET }}
          TF_VAR_initPayment_s3_key: ${{ steps.artifacts.outputs.initPayment }}
          TF_VAR_processPayment_s3_key: ${{ steps.artifacts.outputs.processPayment }}
          TF_VAR_getDetails_s3_key: ${{ steps.artifacts.outputs.getDetails }}
          TF_VAR_testCert_s3_key: ${{ steps.artifacts.outputs.testCert }}
          TF_VAR_migrationRunner_s3_key: ${{ steps.artifacts.outputs.migrationRunner }}
          # AWS Chatbot → Microsoft Teams routing. Missing secrets disable Teams routing (enable_teams=false).
          TF_VAR_teams_tenant_id: ${{ secrets.PROD_TEAMS_TENANT_ID }}
          TF_VAR_teams_team_id: ${{ secrets.PROD_TEAMS_TEAM_ID }}
          TF_VAR_teams_channel_id: ${{ secrets.PROD_TEAMS_CHANNEL_ID }}
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan
          code=$?
          echo "exitcode=$code" >> $GITHUB_OUTPUT
          terraform show -no-color tfplan > tfplan.txt || true
          set -e

      - name: Terraform Apply (if required)
        if: ${{ ((github.event_name == 'release' && github.event.release.prerelease == false) || (!inputs.plan_only)) && steps.tf_plan.outputs.exitcode == '2' }}
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs (for integration tests)
        if: ${{ (github.event_name == 'release' && github.event.release.prerelease == false) || (!inputs.plan_only) }}
        id: tf_outputs
        working-directory: terraform/environments/prod
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          MIGRATION_FN=$(terraform output -raw migration_runner_function_name)
          ALERTS_SNS_TOPIC_ARN=$(terraform output -raw alerts_sns_topic_arn)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "migration_fn=$MIGRATION_FN" >> $GITHUB_OUTPUT
          echo "alerts_sns_topic_arn=$ALERTS_SNS_TOPIC_ARN" >> $GITHUB_OUTPUT
          echo "API Gateway URL: $API_URL"
          echo "Migration runner: $MIGRATION_FN"  

      - name: Run DB migrations (idempotent via knex_migrations table)
        if: ${{ ((github.event_name == 'release' && github.event.release.prerelease == false) || (!inputs.plan_only)) }}
        env:
          MIGRATION_FN: ${{ steps.tf_outputs.outputs.migration_fn }}
        run: |
          set -euo pipefail
          echo "Running migrations via: $MIGRATION_FN"
          aws lambda invoke \
            --function-name "$MIGRATION_FN" \
            --payload '{"command":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            --cli-read-timeout 130 \
            response.json | tee invoke-meta.json
          cat response.json
          if jq -e '.FunctionError' invoke-meta.json > /dev/null 2>&1; then
            echo "ERROR: migrate Lambda reported a function error" >&2
            exit 1
          fi

      - name: Post-deploy health check (synthetic, read-only)
        if: ${{ ((github.event_name == 'release' && github.event.release.prerelease == false) || (!inputs.plan_only)) && steps.tf_plan.outputs.exitcode == '2' }}
        shell: bash
        env:
          API_URL: ${{ steps.tf_outputs.outputs.api_url }}
          DEPLOY_TAG: ${{ needs.promote.outputs.tag }}
        run: |
          set -euo pipefail
          trap 'echo "::error::Post-deploy health check FAILED"; [ -f health.json ] && cat health.json || true' ERR
          echo "Health check against: $API_URL/health"

          STATUS=$(curl -s -o health.json -w '%{http_code}' --retry 3 --retry-delay 5 --max-time 30 \
            -X GET "$API_URL/health" \
            --aws-sigv4 "aws:amz:${AWS_REGION}:execute-api" \
            --user "$AWS_ACCESS_KEY_ID:$AWS_SECRET_ACCESS_KEY" \
            -H "x-amz-security-token: $AWS_SESSION_TOKEN" \
            -H "X-Deploy-Tag: $DEPLOY_TAG")

          echo "HTTP_STATUS=$STATUS"
          jq . health.json || cat health.json

          test "$STATUS" = "200"
          test "$(jq -r '.status' health.json)" = "healthy"
          echo "Post-deploy health check PASSED"

      - name: Upload health check diagnostics on failure
        if: ${{ failure() && steps.tf_outputs.outputs.api_url != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: prod-deploy-health-failure-${{ github.run_id }}
          path: health.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify on deploy failure (SNS -> Teams/email)
        if: ${{ failure() && steps.tf_outputs.outputs.alerts_sns_topic_arn != '' }}
        run: |
          set -uo pipefail
          SUMMARY="No /health response was captured; the failure may have occurred before the health check ran."
          if [ -f health.json ]; then
            FAILED=$(jq -r '.checks | to_entries | map(select(.value.status == "failed") | "\(.key)=\(.value.error // "failed")") | join("; ")' health.json 2>/dev/null || true)
            [ -n "$FAILED" ] && SUMMARY="Failing checks: $FAILED"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf 'Production deployment %s failed.\n%s\nRun: %s\nDiagnostics: download the prod-deploy-health-failure-%s artifact.' \
            "${{ needs.promote.outputs.tag }}" "$SUMMARY" "$RUN_URL" "${{ github.run_id }}")
          aws sns publish \
            --topic-arn "${{ steps.tf_outputs.outputs.alerts_sns_topic_arn }}" \
            --subject "Prod deploy FAILED - ${{ needs.promote.outputs.tag }}" \
            --message "$MSG"
