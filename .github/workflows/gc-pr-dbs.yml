name: GC - Orphaned PR Databases

on:
  schedule:
    # Runs nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  gc_pr_databases:
    name: Drop orphaned PR databases
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials (OIDC - Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find and drop orphaned PR databases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Fetching recently closed PRs..."
          CLOSED_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state closed \
            --limit 100 \
            --json number \
            --jq '.[].number')

          if [ -z "$CLOSED_PRS" ]; then
            echo "No closed PRs found. Nothing to clean up."
            exit 0
          fi

          for PR_NUMBER in $CLOSED_PRS; do
            FUNCTION_NAME="ustc-payment-processor-pr-${PR_NUMBER}-migrationHandler"
            echo "Checking PR #${PR_NUMBER} — Lambda: $FUNCTION_NAME"

            # Check if the Lambda function still exists (PR env may already be destroyed via pr_cleanup)
            if ! aws lambda get-function --function-name "$FUNCTION_NAME" > /dev/null 2>&1; then
              echo "  Lambda not found — skipping PR #${PR_NUMBER}"
              continue
            fi

            echo "  Invoking drop-db for PR #${PR_NUMBER}..."
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --payload '{"command":"drop-db"}' \
              --cli-binary-format raw-in-base64-out \
              response.json || true
            cat response.json || true
            echo ""
          done

          echo "GC complete."
