name: GC - Orphaned PR Databases and Roles

on:
  schedule:
    # Runs nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  gc_pr_databases_and_roles:
    name: Drop orphaned PR databases and roles
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS Credentials (OIDC - Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Drop stale PR databases and roles via dev migrationRunner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Fetching open PR numbers..."
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --limit 100 \
            --json number \
            --jq '[.[].number]')

          echo "Open PRs: $OPEN_PRS"

          # Drop databases first. Roles cannot be cleanly dropped while they own
          # objects, so removing the per-PR database removes any lingering grants
          # and ownership before we try to drop the role itself.
          DB_PAYLOAD=$(jq -n --argjson prs "$OPEN_PRS" '{"command":"gc-dbs","openPrNumbers":$prs}')

          echo "Invoking dev migrationRunner with gc-dbs..."
          aws lambda invoke \
            --function-name ustc-payment-processor-migrationRunner \
            --payload "$DB_PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            response-dbs.json
          cat response-dbs.json

          ROLE_PAYLOAD=$(jq -n --argjson prs "$OPEN_PRS" '{"command":"gc-roles","openPrNumbers":$prs}')

          echo "Invoking dev migrationRunner with gc-roles..."
          aws lambda invoke \
            --function-name ustc-payment-processor-migrationRunner \
            --payload "$ROLE_PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            response-roles.json
          cat response-roles.json
