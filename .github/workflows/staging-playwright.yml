name: Staging Pay.gov E2E

on:
  workflow_dispatch:

jobs:
  paygov-e2e:
    runs-on: ubuntu-latest
    environment:
      name: staging

    permissions:
      id-token: write
      contents: read

    env:
      BASE_URL: https://stg-payments.ustaxcourt.gov

      PAYGOV_QA_CC_SUCCESS_PAN: ${{ secrets.PAYGOV_QA_CC_SUCCESS_PAN }}
      PAYGOV_QA_CC_SUCCESS_EXP: ${{ secrets.PAYGOV_QA_CC_SUCCESS_EXP }}
      PAYGOV_QA_CC_SUCCESS_CVV: ${{ secrets.PAYGOV_QA_CC_SUCCESS_CVV }}
      PAYGOV_QA_CC_SUCCESS_NAME: ${{ secrets.PAYGOV_QA_CC_SUCCESS_NAME }}
      PAYMENT_PORTAL_EMAIL: franz.tanglao.ctr+${{ github.run_id }}@ustaxcourt.gov
      STAGING_AWS_DEPLOYER_ROLE_ARN: ${{ secrets.STAGING_AWS_DEPLOYER_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.STAGING_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS Caller
        run: aws sts get-caller-identity

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Staging E2E
        run: npm run test:staging-e2e

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-paygov-e2e
          path: |
            test-results/**
            playwright-report/**
            failure-summary.json
