name: CICD - Dev

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_IN_AUTOMATION: "true"

jobs:
  check_actor:
    name: Check if Dependabot
    runs-on: ubuntu-latest
    outputs:
      is_dependabot: ${{ steps.check.outputs.is_dependabot }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.actor }}" == "dependabot[bot]" ]] || [[ "${{ github.head_ref }}" == dependabot/* ]]; then
            echo "is_dependabot=true" >> $GITHUB_OUTPUT
          else
            echo "is_dependabot=false" >> $GITHUB_OUTPUT
          fi

  pr_build_test_deploy:
    needs: check_actor
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && needs.check_actor.outputs.is_dependabot != 'true'
    name: PR Build/Test and Ephemeral Deploy (Dev Account)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build Lambda
        run: npm run build:lambda

      - name: Configure AWS Credentials (OIDC - Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS caller identity (can be deleted later)
        run: |
          aws sts get-caller-identity
          aws configure list

      - name: Upload Lambda Artifacts to S3 (PR)
        id: upload_artifacts_pr
        working-directory: terraform/scripts
        run: |
          export GIT_SHA="${{ github.event.pull_request.head.sha }}"
          export PR_NUMBER="${{ github.event.pull_request.number }}"
          export BUCKET="${{ vars.ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}"
          ./upload_lambda_artifacts_s3.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -backend-config=backend-pr.hcl

      - name: Select/Create PR Workspace
        id: tfws
        working-directory: terraform/environments/dev
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          WS="pr-${PR_NUMBER}"
          terraform workspace select "$WS" >/dev/null 2>&1 || terraform workspace new "$WS"
          terraform workspace select "$WS"
          echo "workspace=$WS" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/dev
        env:
          TF_VAR_namespace: pr-${{ github.event.pull_request.number }}
          TF_VAR_artifact_bucket: ${{ steps.upload_artifacts_pr.outputs.artifact_bucket }}
          TF_VAR_initPayment_s3_key: ${{ steps.upload_artifacts_pr.outputs.initPayment_s3_key }}
          TF_VAR_processPayment_s3_key: ${{ steps.upload_artifacts_pr.outputs.processPayment_s3_key }}
          TF_VAR_getDetails_s3_key: ${{ steps.upload_artifacts_pr.outputs.getDetails_s3_key }}
          TF_VAR_testCert_s3_key: ${{ steps.upload_artifacts_pr.outputs.testCert_s3_key }}
          TF_VAR_migrationRunner_s3_key: ${{ steps.upload_artifacts_pr.outputs.migrationRunner_s3_key }}
          TF_VAR_initPayment_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.initPayment_source_code_hash }}
          TF_VAR_processPayment_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.processPayment_source_code_hash }}
          TF_VAR_getDetails_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.getDetails_source_code_hash }}
          TF_VAR_testCert_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.testCert_source_code_hash }}
          TF_VAR_migrationRunner_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.migrationRunner_source_code_hash }}
        run: |
          set +e
          terraform plan -input=false -lock-timeout=2m -detailed-exitcode -out=tfplan
          code=$?
          echo "exitcode=$code" >> $GITHUB_OUTPUT
          terraform show -no-color tfplan > tfplan.txt || true
          set -e

      - name: Debug plan exit code
        run: echo "plan exitcode=${{ steps.plan.outputs.exitcode }}"

      - name: Terraform Apply (if required)
        if: ${{ steps.plan.outputs.exitcode == '2' }}
        working-directory: terraform/environments/dev
        env:
          TF_VAR_namespace: pr-${{ github.event.pull_request.number }}
          TF_VAR_artifact_bucket: ${{ steps.upload_artifacts_pr.outputs.artifact_bucket }}
          TF_VAR_initPayment_s3_key: ${{ steps.upload_artifacts_pr.outputs.initPayment_s3_key }}
          TF_VAR_processPayment_s3_key: ${{ steps.upload_artifacts_pr.outputs.processPayment_s3_key }}
          TF_VAR_getDetails_s3_key: ${{ steps.upload_artifacts_pr.outputs.getDetails_s3_key }}
          TF_VAR_testCert_s3_key: ${{ steps.upload_artifacts_pr.outputs.testCert_s3_key }}
          TF_VAR_migrationRunner_s3_key: ${{ steps.upload_artifacts_pr.outputs.migrationRunner_s3_key }}
          TF_VAR_initPayment_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.initPayment_source_code_hash }}
          TF_VAR_processPayment_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.processPayment_source_code_hash }}
          TF_VAR_getDetails_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.getDetails_source_code_hash }}
          TF_VAR_testCert_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.testCert_source_code_hash }}
          TF_VAR_migrationRunner_source_code_hash: ${{ steps.upload_artifacts_pr.outputs.migrationRunner_source_code_hash }}
        run: terraform apply -auto-approve tfplan

      - name: Smoke check (post-apply to verify the workspace)
        if: ${{ steps.plan.outputs.exitcode == '2' }}
        working-directory: terraform/environments/dev
        run: |
          echo "Workspace:" $(terraform workspace show)
          echo "State resources:" && terraform state list || true

      - name: Get Terraform Outputs (if available)
        id: tf_outputs
        working-directory: terraform/environments/dev
        run: |
          # Check if outputs exist before trying to read them
          if terraform output api_gateway_url &>/dev/null; then
            API_URL=$(terraform output -raw api_gateway_url)
            TEST_UNAUTHORIZED_ROLE_ARN=$(terraform output -raw test_unauthorized_role_arn 2>/dev/null || echo "")

            # Validate outputs are actual values (not warning text)
            if [[ "$API_URL" == https://* ]]; then
              echo "api_url=$API_URL" >> $GITHUB_OUTPUT
              echo "test_unauthorized_role_arn=$TEST_UNAUTHORIZED_ROLE_ARN" >> $GITHUB_OUTPUT
              echo "has_outputs=true" >> $GITHUB_OUTPUT
              echo "API Gateway URL: $API_URL"
              echo "Test Unauthorized Role ARN: $TEST_UNAUTHORIZED_ROLE_ARN"
            else
              echo "has_outputs=false" >> $GITHUB_OUTPUT
              echo "Outputs exist but appear invalid; skipping integration tests."
            fi
          else
            echo "has_outputs=false" >> $GITHUB_OUTPUT
            echo "PR workspace not yet provisioned; skipping integration tests until outputs exist."
          fi

      - name: Copy secrets from dev (for PR environments)
        if: ${{ steps.tf_outputs.outputs.has_outputs == 'true' && github.event.pull_request.number }}
        run: |
          echo "Copying secret values from dev to PR environment..."

          # Copy certificate passphrase
          CERT_SECRET_ID=$(terraform output -raw cert_passphrase_secret_id)
          aws secretsmanager get-secret-value --secret-id "ustc/pay-gov/dev/cert-passphrase" --query SecretString --output text | \
          aws secretsmanager put-secret-value --secret-id "$CERT_SECRET_ID" --secret-string file:///dev/stdin

          # Copy Pay.gov dev server token
          PAYGOV_SECRET_ID=$(terraform output -raw paygov_dev_server_token_secret_id)
          aws secretsmanager get-secret-value --secret-id "ustc/pay-gov/dev/pay-gov-dev-server-token" --query SecretString --output text | \
          aws secretsmanager put-secret-value --secret-id "$PAYGOV_SECRET_ID" --secret-string file:///dev/stdin

          # Copy client permissions (authorized IAM role ARNs for Lambda-level auth).
          # Guarded: this secret only exists in dev once PAY-008 has been deployed there.
          # When absent, seed PR env with the deployer role so integration tests (which run as that role) pass.
          CLIENT_PERMISSIONS_SECRET_ID=$(terraform output -raw client_permissions_secret_id)
          CLIENT_PERMISSIONS=$(aws secretsmanager get-secret-value --secret-id "ustc/pay-gov/dev/client-permissions" --query SecretString --output text 2>/dev/null || echo "")
          if [ -n "$CLIENT_PERMISSIONS" ]; then
            aws secretsmanager put-secret-value --secret-id "$CLIENT_PERMISSIONS_SECRET_ID" --secret-string "$CLIENT_PERMISSIONS"
            echo "Copied client-permissions from dev."
          else
            echo "Source secret 'ustc/pay-gov/dev/client-permissions' not found — seeding PR env with deployer role for integration tests."
            # Lambda expects IAM role ARN (arn:aws:iam::ACCOUNT:role/NAME); API Gateway sends assumed-role ARN.
            CALLER_ARN=$(aws sts get-caller-identity --query Arn --output text)
            ACCOUNT_ID=$(echo "$CALLER_ARN" | cut -d: -f5)
            ROLE_NAME=$(echo "$CALLER_ARN" | sed -n 's|.*assumed-role/\([^/]*\)/.*|\1|p')
            if [ -n "$ROLE_NAME" ]; then
              IAM_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
              # Wildcard allowedFeeIds so CI tests pass regardless of which fee IDs are added in the future.
              # This entry is CI-only and never written to dev/stg/prod client-permissions.
              DEPLOYER_PERMISSIONS=$(jq -n --arg arn "$IAM_ROLE_ARN" '[{clientName: "CI Deployer", clientRoleArn: $arn, allowedFeeIds: ["*"]}]')
              aws secretsmanager put-secret-value --secret-id "$CLIENT_PERMISSIONS_SECRET_ID" --secret-string "$DEPLOYER_PERMISSIONS"
              echo "Seeded client-permissions with deployer role: $IAM_ROLE_ARN"
            else
              echo "ERROR: Could not derive IAM role ARN from caller identity: $CALLER_ARN"
              echo "Expected an assumed-role ARN (arn:aws:sts::ACCOUNT:assumed-role/ROLE/SESSION)."
              echo "Integration tests will fail with 403 Client not registered without this seed."
              exit 1
            fi
          fi

          # Copy allowed account IDs (for API Gateway cross-account resource policy).
          # Guarded: this secret only exists in dev once PAY-008 has been deployed there.
          # PR environments use the Terraform-seeded default ([]) when the source is absent —
          # all CI integration tests run as the deployer role (same account) so they still pass.
          ALLOWED_ACCOUNT_IDS_SECRET_ID=$(terraform output -raw allowed_account_ids_secret_id)
          ALLOWED_IDS=$(aws secretsmanager get-secret-value --secret-id "ustc/pay-gov/dev/allowed-account-ids" --query SecretString --output text 2>/dev/null || echo "")
          if [ -n "$ALLOWED_IDS" ]; then
            aws secretsmanager put-secret-value --secret-id "$ALLOWED_ACCOUNT_IDS_SECRET_ID" --secret-string "$ALLOWED_IDS"
            echo "Copied allowed-account-ids from dev."
          else
            echo "Source secret 'ustc/pay-gov/dev/allowed-account-ids' not found — PR env will use Terraform-seeded default ([])."
            echo "Expected on the first PR before PAY-008 is deployed to dev. CI tests will still pass."
          fi

          echo "All secret values copied successfully"
        working-directory: terraform/environments/dev

      - name: Integration tests (PR environment)
        if: ${{ steps.tf_outputs.outputs.has_outputs == 'true' }}
        env:
          NODE_ENV: test
          TEST_NAMESPACE: pr-${{ github.event.pull_request.number }}
          BASE_URL: ${{ steps.tf_outputs.outputs.api_url }}
        run: |
          npm ci
          echo "Running integration tests against: $BASE_URL"
          npm run test:integration

      - name: SigV4 Smoke Test (PR environment)
        if: ${{ steps.tf_outputs.outputs.has_outputs == 'true' }}
        env:
          BASE_URL: ${{ steps.tf_outputs.outputs.api_url }}
          AWS_REGION: ${{ env.AWS_REGION }}
          TEST_UNAUTHORIZED_ROLE_ARN: ${{ steps.tf_outputs.outputs.test_unauthorized_role_arn }}
        run: |
          echo "Running SigV4 enforcement smoke test against: $BASE_URL"
          echo "This validates that API Gateway accepts signed requests and rejects unsigned requests."
          echo "Test unauthorized role: $TEST_UNAUTHORIZED_ROLE_ARN"
          npx jest src/test/integration/sigv4Smoke.test.ts --verbose

  pr_cleanup:
    needs: check_actor
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && needs.check_actor.outputs.is_dependabot != 'true'
    name: PR Cleanup (Destroy Ephemeral Env)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Configure AWS Credentials (OIDC - Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (dev backend)
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -backend-config=backend-pr.hcl

      - name: Select PR Workspace (if exists)
        id: ws
        working-directory: terraform/environments/dev
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          WS="pr-${PR_NUMBER}"
          (terraform workspace select "$WS" && echo "workspace=$WS" >> $GITHUB_OUTPUT) || echo "no_ws=true" >> $GITHUB_OUTPUT

      - name: Terraform Plan Destroy (PR workspace)
        if: ${{ steps.ws.outputs.no_ws != 'true' }}
        working-directory: terraform/environments/dev
        run: |
          terraform plan -destroy -input=false -out=tfplan-destroy || exit 1
          terraform show -no-color tfplan-destroy > tfplan-destroy.txt || true

      - name: Upload destroy plan (text)
        if: ${{ steps.ws.outputs.no_ws != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-destroy-text-${{ github.run_id }}
          path: terraform/environments/dev/tfplan-destroy.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Destroy PR Workspace Resources
        if: ${{ steps.ws.outputs.no_ws != 'true' }}
        working-directory: terraform/environments/dev
        env:
          TF_VAR_namespace: pr-${{ github.event.pull_request.number }}
        run: |
          terraform destroy -auto-approve

      - name: Delete PR Workspace
        if: ${{ steps.ws.outputs.no_ws != 'true' && success() }}
        working-directory: terraform/environments/dev
        run: |
          terraform workspace select default || true
          terraform workspace delete -force ${{ steps.ws.outputs.workspace }} || true

  deploy_dev:
    needs: check_actor
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check_actor.outputs.is_dependabot != 'true' && !contains(github.event.head_commit.message, 'changeset-release')
    name: Deploy to Dev (on push to main)
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need history to find merge commit

      - name: Configure AWS Credentials (OIDC - Dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_DEPLOYER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract PR Number from Merge Commit
        id: extract_pr
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          PR_NUM=""

          # Extract PR number from any format containing #<number>
          if [[ "$COMMIT_MSG" =~ \#([0-9]+) ]]; then
            PR_NUM="${BASH_REMATCH[1]}"
            echo "Found PR number from commit message: $PR_NUM"
          else
            echo "PR number not found in commit message, trying API..."
            API_RESULT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${GITHUB_SHA}/pulls" | jq -r '.[0].number // empty')
            if [[ "$API_RESULT" != "null" && -n "$API_RESULT" ]]; then
              PR_NUM="$API_RESULT"
              echo "Found PR number from API: $PR_NUM"
            fi
          fi

          # Validate PR number was extracted
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            echo "ERROR: Could not extract PR number from commit or API"
            echo "This deployment requires a valid PR number to promote artifacts"
            exit 1
          fi

          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Promote Lambda Artifacts (PR → Dev)
        id: promote_artifacts
        working-directory: terraform/scripts
        env:
          ARTIFACT_BUCKET: ${{ vars.ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}
        run: |
          export PR_NUMBER="${{ steps.extract_pr.outputs.pr_number }}"
          export BUCKET="${ARTIFACT_BUCKET}"
          export TARGET_ENV="dev"
          export GIT_SHA="" # Initialize as empty to allow auto-discovery
          ./promote_artifacts_s3.sh

      - name: Resolve deploy SHA from promoted artifact key
        id: resolve_deploy_sha
        run: |
          set -euo pipefail
          KEY='${{ steps.promote_artifacts.outputs.initPayment_s3_key }}'
          if [ -z "$KEY" ]; then
            echo "ERROR: initPayment_s3_key output is empty; cannot resolve deploy SHA" >&2
            exit 1
          fi
          # Expected format: artifacts/dev/<SHA>/initPayment.zip
          DEPLOY_SHA=$(echo "$KEY" | awk -F'/' '{print $(NF-1)}')
          if [ -z "$DEPLOY_SHA" ]; then
            echo "ERROR: Failed to derive deploy SHA from key: $KEY" >&2
            exit 1
          fi
          echo "sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
          echo "Resolved deploy SHA (from promoted artifacts): $DEPLOY_SHA"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Terraform Init (dev backend)
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -backend-config=backend.hcl -reconfigure

      - name: Terraform Plan (dev)
        id: plan_dev
        working-directory: terraform/environments/dev
        env:
          TF_VAR_artifact_bucket: ${{ steps.promote_artifacts.outputs.artifact_bucket }}
          TF_VAR_initPayment_s3_key: ${{ steps.promote_artifacts.outputs.initPayment_s3_key }}
          TF_VAR_processPayment_s3_key: ${{ steps.promote_artifacts.outputs.processPayment_s3_key }}
          TF_VAR_getDetails_s3_key: ${{ steps.promote_artifacts.outputs.getDetails_s3_key }}
          TF_VAR_testCert_s3_key: ${{ steps.promote_artifacts.outputs.testCert_s3_key }}
          TF_VAR_migrationRunner_s3_key: ${{ steps.promote_artifacts.outputs.migrationRunner_s3_key }}
          TF_VAR_initPayment_source_code_hash: ${{ steps.promote_artifacts.outputs.initPayment_source_code_hash }}
          TF_VAR_processPayment_source_code_hash: ${{ steps.promote_artifacts.outputs.processPayment_source_code_hash }}
          TF_VAR_getDetails_source_code_hash: ${{ steps.promote_artifacts.outputs.getDetails_source_code_hash }}
          TF_VAR_testCert_source_code_hash: ${{ steps.promote_artifacts.outputs.testCert_source_code_hash }}
          TF_VAR_migrationRunner_source_code_hash: ${{ steps.promote_artifacts.outputs.migrationRunner_source_code_hash }}
        run: |
          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > tfplan.txt || true

      - name: Upload Terraform plan
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-text-${{ github.run_id }}
          path: terraform/environments/dev/tfplan.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Terraform Apply (dev)
        working-directory: terraform/environments/dev
        env:
          TF_VAR_artifact_bucket: ${{ steps.promote_artifacts.outputs.artifact_bucket }}
          TF_VAR_initPayment_s3_key: ${{ steps.promote_artifacts.outputs.initPayment_s3_key }}
          TF_VAR_processPayment_s3_key: ${{ steps.promote_artifacts.outputs.processPayment_s3_key }}
          TF_VAR_getDetails_s3_key: ${{ steps.promote_artifacts.outputs.getDetails_s3_key }}
          TF_VAR_testCert_s3_key: ${{ steps.promote_artifacts.outputs.testCert_s3_key }}
          TF_VAR_migrationRunner_s3_key: ${{ steps.promote_artifacts.outputs.migrationRunner_s3_key }}
          TF_VAR_initPayment_source_code_hash: ${{ steps.promote_artifacts.outputs.initPayment_source_code_hash }}
          TF_VAR_processPayment_source_code_hash: ${{ steps.promote_artifacts.outputs.processPayment_source_code_hash }}
          TF_VAR_getDetails_source_code_hash: ${{ steps.promote_artifacts.outputs.getDetails_source_code_hash }}
          TF_VAR_testCert_source_code_hash: ${{ steps.promote_artifacts.outputs.testCert_source_code_hash }}
          TF_VAR_migrationRunner_source_code_hash: ${{ steps.promote_artifacts.outputs.migrationRunner_source_code_hash }}
        run: terraform apply -auto-approve tfplan

      - name: Get API URL (dev)
        id: tf_outputs_dev
        working-directory: terraform/environments/dev
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          TEST_UNAUTHORIZED_ROLE_ARN=$(terraform output -raw test_unauthorized_role_arn 2>/dev/null || echo "")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "test_unauthorized_role_arn=$TEST_UNAUTHORIZED_ROLE_ARN" >> $GITHUB_OUTPUT
          echo "API Gateway URL: $API_URL"
          echo "Test Unauthorized Role ARN: $TEST_UNAUTHORIZED_ROLE_ARN"

      - name: Setup Node (for smoke test)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies (for smoke test)
        run: npm ci

      - name: SigV4 Smoke Test (dev)
        env:
          BASE_URL: ${{ steps.tf_outputs_dev.outputs.api_url }}
          AWS_REGION: ${{ env.AWS_REGION }}
          TEST_UNAUTHORIZED_ROLE_ARN: ${{ steps.tf_outputs_dev.outputs.test_unauthorized_role_arn }}
        run: |
          echo "Running SigV4 enforcement smoke test against: $BASE_URL"
          echo "This validates that API Gateway accepts signed requests and rejects unsigned requests."
          echo "Test unauthorized role: $TEST_UNAUTHORIZED_ROLE_ARN"
          npx jest src/test/integration/sigv4Smoke.test.ts --verbose

      - name: Cleanup PR artifacts (soft delete)
        if: ${{ success() }}
        env:
          BUCKET: ${{ vars.ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}
          PR_NUMBER: ${{ steps.extract_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "Cleanup skipped: empty PR_NUMBER"
            exit 0
          fi
          PREFIX="artifacts/pr-${PR_NUMBER}/"
          if [ -z "${PREFIX:-}" ]; then
            echo "Cleanup skipped: empty PREFIX"
            exit 0
          fi
          echo "Soft deleting s3://$BUCKET/$PREFIX"
          aws s3 rm "s3://$BUCKET/$PREFIX" --recursive || true

      - name: Auto-tag dev release
        if: ${{ success() && github.actor != 'dependabot[bot]' }}
        run: |
          set -euo pipefail

          # Configure git for tagging
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate semantic version tag for dev release
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --match="v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/v//' | sed 's/-.*$//')
          BUILD_NUM="${{ github.run_number }}"
          DEV_TAG="v${BASE_VERSION}-dev.${BUILD_NUM}"


          echo "Creating Dev Release Tag"
          echo "Tag: $DEV_TAG"
          echo "Commit SHA: ${{ steps.resolve_deploy_sha.outputs.sha }}"
          echo "PR Number: ${{ steps.extract_pr.outputs.pr_number }}"
          echo "Artifacts Path: s3://${{ vars.ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}/artifacts/dev/${{ steps.resolve_deploy_sha.outputs.sha }}/"

          # Create and push tag
          git tag -a "$DEV_TAG" "${{ steps.resolve_deploy_sha.outputs.sha }}" -m "Dev release $DEV_TAG

          Deployed from PR #${{ steps.extract_pr.outputs.pr_number }}
          Commit: ${{ steps.resolve_deploy_sha.outputs.sha }}
          Artifacts: s3://${{ vars.ARTIFACT_BUCKET || 'ustc-payment-portal-build-artifacts' }}/artifacts/dev/${{ steps.resolve_deploy_sha.outputs.sha }}/

          Ready for staging promotion!"

          # Ensure origin uses the workflow token for authentication (avoids 403)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$DEV_TAG"

          echo ""
          echo "SUCCESS: Created dev release tag: $DEV_TAG"
          echo "This tag is ready for staging deployment! Deploy when you're ready."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
