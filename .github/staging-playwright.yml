name: Staging E2E (Playwright)

on:
  workflow_call:
    inputs:
      api_url:
        required: true
        type: string
    secrets:
      PAYGOV_QA_CC_SUCCESS_PAN:
        required: true
      PAYGOV_QA_CC_SUCCESS_EXP:
        required: true
      PAYGOV_QA_CC_SUCCESS_CVV:
        required: true
      PAYGOV_QA_CC_SUCCESS_NAME:
        required: true

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run staging Pay.gov E2E gate
        env:
          BASE_URL: ${{ inputs.api_url }}
          PAYGOV_QA_CC_SUCCESS_PAN: ${{ secrets.PAYGOV_QA_CC_SUCCESS_PAN }}
          PAYGOV_QA_CC_SUCCESS_EXP: ${{ secrets.PAYGOV_QA_CC_SUCCESS_EXP }}
          PAYGOV_QA_CC_SUCCESS_CVV: ${{ secrets.PAYGOV_QA_CC_SUCCESS_CVV }}
          PAYGOV_QA_CC_SUCCESS_NAME: ${{ secrets.PAYGOV_QA_CC_SUCCESS_NAME }}
        run: npm run test:staging-e2e

      - name: Upload staging E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-artifacts
          path: |
            src/test/staging-e2e/test-results/**
            src/test/staging-e2e/playwright-report/**
            failure-summary.json
          if-no-files-found: ignore
