services:
  postgres:
    image: postgres:14
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: mydb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d mydb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-init:
    image: node:24
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: mydb
      NODE_ENV: development
    volumes:
      - ./:/workspace
      - db_init_node_modules:/workspace/node_modules
    command: sh -c "npm ci && npm run migrate:latest && npm run seed:run"

volumes:
  postgres_data:
  db_init_node_modules:
