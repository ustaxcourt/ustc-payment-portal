services:
  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: mydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dashboard-api:
    image: node:20
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: mydb
      API_PORT: 3001
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${DASHBOARD_API_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./dashboard-api:/app
      - dashboard_api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --legacy-watch"

  web-client:
    image: node:20
    working_dir: /app
    depends_on:
      dashboard-api:
        condition: service_healthy
    environment:
      VITE_DASHBOARD_API_BASE_URL: http://localhost:${DASHBOARD_API_PORT:-3001}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_CLIENT_PORT:-5173}:5173"
    volumes:
      - ./web-client:/app
      - web_client_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  root_node_modules:
  dashboard_api_node_modules:
  web_client_node_modules:
